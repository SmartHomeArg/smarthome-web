<div class="chat-ia-float" data-chat-ia-root>
  <button type="button" class="chat-ia-toggle" aria-label="Abrir chat 24hs con operador" aria-expanded="false">
    <img
      class="chat-ia-toggle__gif"
      data-chat-toggle-gif
      alt=""
      aria-hidden="true"
    >
  </button>

  <section class="chat-ia-panel" aria-label="Chat 24hs SmartHome" hidden>
    <header class="chat-ia-panel__header">
      <p class="chat-ia-panel__title">Chat 24hs SmartHome</p>
      <div class="chat-ia-panel__actions">
        <button type="button" class="chat-ia-panel__minimize" aria-label="Minimizar chat">
          <i class="bi bi-dash-lg" aria-hidden="true"></i>
        </button>
        <button type="button" class="chat-ia-panel__close" aria-label="Cerrar chat">
          <i class="bi bi-x-lg" aria-hidden="true"></i>
        </button>
      </div>
    </header>

    <div class="chat-ia-messages" aria-live="polite"></div>

    <form class="chat-ia-form" novalidate>
      <input
        type="text"
        class="chat-ia-input"
        placeholder="Escribe tu consulta"
        maxlength="700"
        autocomplete="off"
      >
      <button type="submit" class="chat-ia-send">Enviar</button>
    </form>
  </section>
</div>
