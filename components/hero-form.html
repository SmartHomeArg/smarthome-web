<div class="hero-form-card">
  <div class="hero-form-top">
    <!-- <p class="hero-form-kicker">HASTA</p> -->
    <h3><span>30%</span> de descuento</h3>
    <p class="hero-form-badge">POR 6 MESES</p>
  </div>

  <div class="hero-form-body">
    <h4>Solicitá GRATIS una asesoría telefónica</h4>

    <form id="hero-lead-form">
      <input type="hidden" name="origen" id="lead-origen">

      <div class="form-group">
        <label for="lead-nombre">Nombre y apellido *</label>
        <input
          type="text"
          id="lead-nombre"
          name="nombre"
          placeholder="Tu nombre completo"
          required
        >
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="lead-area">Cod Área *</label>
          <input
            type="text"
            id="lead-area"
            name="area"
            placeholder="Cod Área"
            required
          >
        </div>

        <div class="form-group">
          <label for="lead-telefono">Teléfono *</label>
          <input
            type="text"
            id="lead-telefono"
            name="telefono"
            placeholder="Tu teléfono"
            required
          >
          <small>Sin 0 y sin 15</small>
        </div>
      </div>

      <div class="form-group">
        <label for="lead-provincia">Provincia *</label>
        <select id="lead-provincia" name="provincia" required>
          <option value="">Seleccionar</option>
          <option value="San Juan">San Juan</option>
          <option value="Mendoza">Mendoza</option>
          <option value="San Luis">San Luis</option>
          <option value="La Rioja">La Rioja</option>
          <option value="Córdoba">Córdoba</option>
          <option value="Buenos Aires">Buenos Aires</option>
          <option value="Otra">Otra</option>
        </select>
      </div>

      <div class="form-group">
        <label for="lead-email">Mail *</label>
        <input
          type="email"
          id="lead-email"
          name="email"
          placeholder="Tu correo electrónico"
          required
        >
      </div>

      <button type="submit" class="hero-form-submit">Enviar</button>

      <p class="form-required">* Campos obligatorios</p>
    </form>

    <div class="form-message" id="form-message"></div>
  </div>
</div>
